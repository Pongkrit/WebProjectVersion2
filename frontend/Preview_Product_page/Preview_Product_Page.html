                    <img class="sub_product" src="images/product_add3.png" alt="">
                    <img class="sub_product" src="images/product_add4.png" alt="">
                </div> -->

            <div class="right_column"> <!--start of product detail-->

                    </div>
                </div>

                        <button type="button" class="increase">+</button>
                    </div>
            
                    <div class="cart">
                        <button>Add to Cart</button>
                    </div>

                </div>
